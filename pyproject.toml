[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# Keep the first audit-sprint baseline focused on high-signal correctness checks.
# Broader style and import cleanup can be enabled after intentional remediation.
select = ["E9", "F63", "F7", "F82"]

[tool.pytest.ini_options]
addopts = "-m 'not live'"
markers = [
    "live: tests that require live/local collected traffic data or external services",
]
